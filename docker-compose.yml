services:

  api-gateway:
    build:
      context: .
      dockerfile: apigateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - USER_SERVICE_URL=http://user-service:8082
      - PRODUCT_SERVICE_URL=http://product-service:8083
      - CART_SERVICE_URL=http://cart-service:8084
      - ORDER_SERVICE_URL=http://order-service:8085
    depends_on:
      - auth-service
      - user-service
      - product-service
      - cart-service
      - order-service
    networks:
      - lvlup-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: authService/Dockerfile
    container_name: auth-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lvlup_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - FIREBASE_SERVICE_ACCOUNT=/app/firebase/service-account.json
    volumes:
      - ./firebase:/app/firebase:ro
    networks:
      - lvlup-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: userService/Dockerfile
    container_name: user-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lvlup_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    networks:
      - lvlup-network
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: productService/Dockerfile
    container_name: product-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lvlup_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - USER_SERVICE_URL=http://user-service:8082
    networks:
      - lvlup-network
    restart: unless-stopped

  cart-service:
    build:
      context: .
      dockerfile: cartService/Dockerfile
    container_name: cart-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lvlup_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    networks:
      - lvlup-network
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: orderService/Dockerfile
    container_name: order-service
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-lvlup_db}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CART_SERVICE_URL=http://cart-service:8084
      - USER_SERVICE_URL=http://user-service:8082
    networks:
      - lvlup-network
    restart: unless-stopped

networks:
  lvlup-network:
    driver: bridge
