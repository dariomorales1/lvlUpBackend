server.port=8083
spring.application.name=productService
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lvlup_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.maximum-pool-size=10

supabase.url=${SUPABASE_URL:http://localhost:8000}
supabase.service-role-key=${SUPABASE_SERVICE_KEY:your-supabase-service-role-key}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:levelup_files}
supabase.storage.product-folder=${SUPABASE_PRODUCT_FOLDER:products}

userservice.url=${USER_SERVICE_URL:http://localhost:8082}/

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.packages-to-scan=cl.levelup.productservice.controller
springdoc.paths-to-match=/products/**

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

logging.level.org.springframework=INFO
logging.level.cl.levelup.productservice=DEBUG
logging.level.org.springdoc=INFO

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
